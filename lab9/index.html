<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Note dApp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div>
        <h1>Simple Note dApp</h1>
        <p>Write a note:</p>
        <input type="text" id="inputNote" placeholder="Enter your note...">
        <button id="setText">Set Text</button>
        <button id="getNote">Get Text</button>
        <p>Your note: <span id="result"></span></p>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
